name: Sync LinkedIn Posts

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync Feed
        env:
          LINKEDIN_RSS_URL: ${{ secrets.LINKEDIN_RSS_URL }}
        run: node scripts/fetch_linkedin.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/linkedin_posts.json
          if ! git diff --cached --exit-code; then
            git commit -m "chore: auto-sync latest LinkedIn posts via RSS bridge"
            git push origin main
          else
            echo "No changes in LinkedIn posts. Skipping commit."
          fi
